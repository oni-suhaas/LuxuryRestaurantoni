<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:url("https://images.unsplash.com/photo-1555992336-03a23c7b20ee");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* DARK GLASS EFFECT */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

/* LOGIN CARD */
.box{
position:relative;
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:15px;
text-align:center;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(255,215,0,0.4);
z-index:1;
width:300px;
}

/* TITLE */
h2{
color:gold;
margin-bottom:20px;
text-shadow:0 0 10px gold;
}

/* INPUTS */
input{
display:block;
margin:12px auto;
padding:12px;
width:90%;
background:#111;
border:1px solid gold;
border-radius:8px;
color:white;
outline:none;
}

/* BUTTON */
button{
margin-top:15px;
padding:12px;
width:100%;
background:linear-gradient(45deg,gold,orange);
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px gold;
}

/* SMALL TEXT */
.note{
margin-top:10px;
color:#aaa;
font-size:13px;
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="box">

<h2>👤 User Login / Signup</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<input id="mobile" placeholder="Mobile Number">

<button onclick="auth()">Login / Signup</button>

<p class="note">New user? Just enter details to signup</p>

</div>

<script>

function auth(){

let username = document.getElementById("username").value.trim();
let password = document.getElementById("password").value.trim();
let mobile = document.getElementById("mobile").value.trim();

if(!username || !password || !mobile){
alert("Fill all fields");
return;
}

let users = JSON.parse(localStorage.getItem("users")) || [];

let user = users.find(u => u.username === username);

if(user){

if(user.password === password){

localStorage.setItem("loggedInUser", username);
localStorage.setItem("loggedInMobile", user.mobile);

alert("Login successful ✅");
window.location.href = "booking.html";

}else{
alert("Wrong password ❌");
}

}else{

users.push({username,password,mobile});
localStorage.setItem("users", JSON.stringify(users));

alert("Signup successful ✅ Now login again");

}

}

</script>

</body>
</html>
